      <div class="gallery-post-body">
        <a class="backlink" href="/gallery/">
          <span class="backlink__icon" aria-hidden="true">←</span>
          <span class="backlink__text">GALLERY</span>
        </a>
        <h1 class="gallery-post-title">{{ page.title }}</h1>
        <p class="muted gallery-post-date">{{ page.date | date: "%Y.%m.%d" }}</p>
        <div class="gallery-post-content">
          {{ content }}
        </div>
      </div>
    </article>
  </main>

  <script src="/script.js"></script>
